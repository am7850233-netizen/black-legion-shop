<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина | Black Legion Shop</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    

<a href="index.html" class="back-btn">
    ← Главная
</a>



<div class="cart-page">

    <h2>Корзина</h2>

    
<div id="cartItems"></div>

<div class="cart-total">

    <h2>Итого: <span id="totalPrice">0 ₽</span></h2>

    <button class="checkout-btn" id="checkoutButton">
        Оформить заказ
    </button>
    </div>

</div>

</div>
<div id="orderModal" class="order-modal">

    <div class="order-box">

        <h2>Оформление заказа</h2>

        <input type="text" id="customerName" placeholder="Ваше имя">

        <input type="text" id="customerPhone" placeholder="Телефон">

        <input type="text" id="customerTelegram" placeholder="@telegram">

        <input type="text" id="customerCity" placeholder="Город">

        <textarea id="customerComment"
        placeholder="Комментарий к заказу"></textarea>

        <div class="modal-buttons">

            <button id="sendOrder">Отправить</button>

            <button id="closeModal">Отмена</button>

        </div>

    </div>

</div>
<script src="script.js"></script>

</body>
</html>
